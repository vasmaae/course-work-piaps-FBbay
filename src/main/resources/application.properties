spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hospital_db}
spring.datasource.username=${DB_USER:hospital_user}
spring.datasource.password=${DB_PASS:hospital_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.jpa.show-sql=false

spring.thymeleaf.cache=false

spring.mvc.hiddenmethod.filter.enabled=true
spring.mvc.format.date=yyyy-MM-dd

logging.level.com.hospital=INFO
logging.level.com.hospital.registry.audit=DEBUG
logging.level.com.hospital.registry.service=DEBUG
logging.file.name=logs/hospital.log
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%logger{36}] - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%logger{36}] - %msg%n

server.port=8080
