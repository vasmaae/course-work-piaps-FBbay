<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход — Регистратура</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
</head>
<body class="bg-light">
<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow" style="width: 360px;">
        <div class="card-body p-4">
            <h4 class="card-title text-center mb-4">🏥 Регистратура</h4>
            <div th:if="${loginError == 'credentials'}" class="alert alert-danger">Неверный логин или пароль.</div>
            <div th:if="${loginError == 'disabled'}" class="alert alert-warning">Ваш аккаунт заблокирован. Обратитесь к администратору.</div>
            <div th:if="${param.logout}" class="alert alert-info">Вы вышли из системы.</div>
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Логин</label>
                    <input type="text" name="username" class="form-control"
                           maxlength="100" autofocus required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" name="password" class="form-control"
                           maxlength="128" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
            <div class="text-center mt-3">
                <a th:href="@{/register}">Нет аккаунта? Подать заявку</a>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
