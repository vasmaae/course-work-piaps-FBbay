<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация — Регистратура</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
</head>
<body class="bg-light">
<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow" style="width: 400px;">
        <div class="card-body p-4">
            <h4 class="card-title text-center mb-4">Регистрация</h4>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <form th:action="@{/register}" method="post">
                <div class="mb-3">
                    <label class="form-label">ФИО</label>
                    <input type="text" name="fullName" class="form-control" maxlength="255" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Логин</label>
                    <input type="text" name="username" class="form-control" maxlength="100" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" name="password" class="form-control"
                           minlength="6" maxlength="128" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Отправить заявку</button>
            </form>
            <div class="text-center mt-3">
                <a th:href="@{/login}">Уже есть аккаунт? Войти</a>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
