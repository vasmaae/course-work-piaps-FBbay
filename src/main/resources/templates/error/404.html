<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head><title>Страница не найдена</title></head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 text-center">
            <div class="display-1 fw-bold text-secondary">404</div>
            <h2 class="mt-2 mb-3">Страница не найдена</h2>
            <p class="text-muted mb-1">Запрошенная страница не существует или была перемещена.</p>
            <p class="text-muted mb-4">
                <code th:text="${path}" class="small"></code>
            </p>
            <a th:href="@{/}" class="btn btn-primary">На главную</a>
        </div>
    </div>
</div>
</body>
</html>
