<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$CONTENT_TITLE — Регистратура">Регистратура</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">🏥 Регистратура</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <!-- Регистратор -->
                <li class="nav-item" sec:authorize="hasRole('REGISTRAR')">
                    <a class="nav-link" th:href="@{/patients}">Пациенты</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('REGISTRAR')">
                    <a class="nav-link" th:href="@{/patients/archive}">Архив пациентов</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('REGISTRAR')">
                    <a class="nav-link" th:href="@{/emr/archive}">Архив ЭМК</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('REGISTRAR')">
                    <a class="nav-link" th:href="@{/doctors}">Врачи</a>
                </li>
                <!-- Общее -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Отчёты</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/reports/workload}">Нагрузка врачей</a></li>
                        <li><a class="dropdown-item" th:href="@{/reports/vouchers}">Статталоны</a></li>
                        <li><a class="dropdown-item" th:href="@{/reports/diagnoses}">Статистика по МКБ</a></li>
                        <li><a class="dropdown-item" th:href="@{/reports/privileges}">Льготные категории</a></li>
                    </ul>
                </li>
                <!-- Администратор -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/users}">Пользователи</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/audit}">Журнал аудита</a>
                </li>
            </ul>
            <div class="d-flex align-items-center text-white">
                <span class="me-3" sec:authentication="name">User</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm">Выйти</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container-fluid mt-3">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div layout:fragment="content"></div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
