<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head><title th:text="${patient.fullName}">Пациент</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
            <h2 th:text="${patient.fullName}"></h2>
            <span class="badge bg-secondary" th:text="'УИН: ' + ${patient.uin}"></span>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/patients/{id}/edit(id=${patient.id})}" class="btn btn-primary">Редактировать</a>
            <a th:href="@{/patients/{id}/records(id=${patient.id})}" class="btn btn-outline-info">ЭМК</a>
            <a th:href="@{/patients/{id}/card(id=${patient.id})}" target="_blank" class="btn btn-outline-secondary">🖨 Карточка</a>
            <form th:action="@{/patients/{id}/archive(id=${patient.id})}" method="post"
                  onsubmit="return confirm('Переместить пациента в архив?')">
                <button type="submit" class="btn btn-outline-danger">В архив</button>
            </form>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card mb-3">
                <div class="card-header">Персональные данные</div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-5">Дата рождения</dt>
                        <dd class="col-sm-7" th:text="${#temporals.format(patient.birthDate, 'dd.MM.yyyy')}"></dd>
                        <dt class="col-sm-5">Пол</dt>
                        <dd class="col-sm-7" th:text="${patient.gender?.displayName}"></dd>
                        <dt class="col-sm-5">Телефон</dt>
                        <dd class="col-sm-7" th:text="${patient.phone ?: '—'}"></dd>
                        <dt class="col-sm-5">Email</dt>
                        <dd class="col-sm-7" th:text="${patient.email ?: '—'}"></dd>
                        <dt class="col-sm-5">Адрес</dt>
                        <dd class="col-sm-7" th:text="${patient.address ?: '—'}"></dd>
                    </dl>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card mb-3">
                <div class="card-header">Паспортные данные</div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-5">Серия / Номер</dt>
                        <dd class="col-sm-7"
                            th:text="${(patient.passportSeries ?: '') + ' ' + (patient.passportNumber ?: '')}"></dd>
                        <dt class="col-sm-5">Дата выдачи</dt>
                        <dd class="col-sm-7"
                            th:text="${patient.passportIssueDate != null ? #temporals.format(patient.passportIssueDate, 'dd.MM.yyyy') : '—'}"></dd>
                        <dt class="col-sm-5">Кем выдан</dt>
                        <dd class="col-sm-7" th:text="${patient.passportIssuedBy ?: '—'}"></dd>
                    </dl>
                </div>
            </div>

            <div class="card mb-3">
                <div class="card-header">Участок и льготы</div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-5">Участок</dt>
                        <dd class="col-sm-7" th:text="${patient.section?.name ?: '—'}"></dd>
                        <dt class="col-sm-5">Льготная категория</dt>
                        <dd class="col-sm-7" th:text="${patient.privilegeCategory?.displayName ?: '—'}"></dd>
                        <dt class="col-sm-5">Полис</dt>
                        <dd class="col-sm-7"
                            th:text="${patient.insuranceType != null ? patient.insuranceType.displayName + ' ' + (patient.insuranceNumber ?: '') : '—'}"></dd>
                        <dt class="col-sm-5">Аллергии</dt>
                        <dd class="col-sm-7" th:text="${patient.allergies ?: '—'}"></dd>
                        <dt class="col-sm-5">Спецотметки</dt>
                        <dd class="col-sm-7" th:text="${patient.specialNotes ?: '—'}"></dd>
                    </dl>

                    <div class="mt-3 d-flex gap-2" th:if="${patient.section == null}">
                        <form th:action="@{/patients/{id}/attach-section(id=${patient.id})}" method="post"
                              class="d-flex gap-2">
                            <select name="sectionId" class="form-select form-select-sm" style="width: auto">
                                <option th:each="s : ${sections}" th:value="${s.id}"
                                        th:text="'Участок №' + ${s.number} + ' — ' + ${s.name}"></option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-success">Прикрепить</button>
                        </form>
                    </div>
                    <div class="mt-3" th:if="${patient.section != null}">
                        <form th:action="@{/patients/{id}/detach-section(id=${patient.id})}" method="post">
                            <button type="submit" class="btn btn-sm btn-outline-warning">Открепить от участка</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
