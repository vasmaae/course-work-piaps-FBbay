<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head><title th:text="${patient.id == null ? 'Новый пациент' : 'Редактирование пациента'}">Пациент</title></head>
<body>
<div layout:fragment="content">
    <h2 th:text="${patient.id == null ? 'Регистрация пациента' : 'Редактирование пациента'}"></h2>

    <form th:action="${patient.id == null ? '/patients' : '/patients/' + patient.id}"
          th:object="${patient}" method="post" class="mt-3">

        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Фамилия *</label>
                <input type="text" th:field="*{lastName}" class="form-control"
                       th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                       maxlength="100" required>
                <div class="invalid-feedback" th:errors="*{lastName}"></div>
            </div>
            <div class="col-md-4">
                <label class="form-label">Имя *</label>
                <input type="text" th:field="*{firstName}" class="form-control"
                       th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                       maxlength="100" required>
                <div class="invalid-feedback" th:errors="*{firstName}"></div>
            </div>
            <div class="col-md-4">
                <label class="form-label">Отчество</label>
                <input type="text" th:field="*{middleName}" class="form-control" maxlength="100">
            </div>

            <div class="col-md-3">
                <label class="form-label">Пол *</label>
                <select th:field="*{gender}" class="form-select" required>
                    <option value="">— выберите —</option>
                    <option th:each="g : ${genders}" th:value="${g}" th:text="${g.displayName}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Дата рождения *</label>
                <input type="date" th:field="*{birthDate}" class="form-control"
                       th:classappend="${#fields.hasErrors('birthDate')} ? 'is-invalid'"
                       min="1900-01-01"
                       th:max="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}"
                       required>
                <div class="invalid-feedback" th:errors="*{birthDate}"></div>
            </div>
            <div class="col-md-3">
                <label class="form-label">Телефон</label>
                <input type="tel" th:field="*{phone}" class="form-control"
                       th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                       maxlength="20"
                       pattern="(\+7|8)[0-9]{10}"
                       placeholder="+7XXXXXXXXXX">
                <div class="invalid-feedback" th:errors="*{phone}"></div>
            </div>
            <div class="col-md-3">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control" maxlength="255">
            </div>

            <div class="col-12">
                <label class="form-label">Адрес</label>
                <textarea th:field="*{address}" class="form-control" rows="2"></textarea>
            </div>

            <div class="col-md-3">
                <label class="form-label">Серия паспорта</label>
                <input type="text" th:field="*{passportSeries}" class="form-control" maxlength="10">
            </div>
            <div class="col-md-3">
                <label class="form-label">Номер паспорта</label>
                <input type="text" th:field="*{passportNumber}" class="form-control" maxlength="20">
            </div>
            <div class="col-md-3">
                <label class="form-label">Дата выдачи</label>
                <input type="date" th:field="*{passportIssueDate}" class="form-control"
                       min="1900-01-01"
                       th:max="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}">
            </div>
            <div class="col-md-3">
                <label class="form-label">Льготная категория</label>
                <select th:field="*{privilegeCategory}" class="form-select">
                    <option value="">— нет —</option>
                    <option th:each="c : ${privileges}" th:value="${c}" th:text="${c.displayName}"></option>
                </select>
            </div>

            <div class="col-12">
                <label class="form-label">Кем выдан паспорт</label>
                <textarea th:field="*{passportIssuedBy}" class="form-control" rows="2"></textarea>
            </div>

            <div class="col-md-3">
                <label class="form-label">Тип полиса</label>
                <select th:field="*{insuranceType}" class="form-select">
                    <option value="">— не указан —</option>
                    <option th:each="t : ${insuranceTypes}" th:value="${t}" th:text="${t.displayName}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Номер полиса</label>
                <input type="text" th:field="*{insuranceNumber}" class="form-control" maxlength="50">
            </div>

            <div class="col-12">
                <label class="form-label">Аллергии</label>
                <textarea th:field="*{allergies}" class="form-control" rows="2"
                          placeholder="Укажите известные аллергии или непереносимость препаратов"></textarea>
            </div>

            <div class="col-12">
                <label class="form-label">Специальные отметки</label>
                <textarea th:field="*{specialNotes}" class="form-control" rows="2"></textarea>
            </div>
        </div>

        <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a th:href="${patient.id == null ? '/patients' : '/patients/' + patient.id}"
               class="btn btn-outline-secondary">Отмена</a>
        </div>
    </form>
</div>
</body>
</html>
