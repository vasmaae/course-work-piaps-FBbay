<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head><title>Запись ЭМК</title></head>
<body>
<div layout:fragment="content">
    <h2>
        <span th:text="${record.id == null ? 'Новая запись ЭМК' : 'Редактирование записи'}"></span>
        <small class="text-muted fs-6" th:text="'— ' + ${patient.fullName}"></small>
    </h2>

    <form th:action="${record.id == null ? '/patients/' + patient.id + '/records' : '/records/' + record.id}"
          th:object="${record}" method="post" class="mt-3">

        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label">Дата приёма *</label>
                <input type="date" th:field="*{visitDate}" class="form-control"
                       min="1900-01-01"
                       th:max="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}"
                       required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Врач</label>
                <select name="doctorId" class="form-select">
                    <option value="">— не указан —</option>
                    <option th:each="d : ${doctors}" th:value="${d.id}"
                            th:text="${d.fullName + (d.specialization != null ? ' (' + d.specialization + ')' : '')}"
                            th:selected="${record.doctor != null && record.doctor.id == d.id}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Код МКБ</label>
                <input type="text" th:field="*{icdCode}" class="form-control"
                       maxlength="20" placeholder="A00.0">
            </div>

            <div class="col-12">
                <label class="form-label">Жалобы</label>
                <textarea th:field="*{complaints}" class="form-control" rows="3"></textarea>
            </div>
            <div class="col-12">
                <label class="form-label">Диагноз</label>
                <textarea th:field="*{diagnosis}" class="form-control" rows="3"></textarea>
            </div>
            <div class="col-12">
                <label class="form-label">Лечение</label>
                <textarea th:field="*{treatment}" class="form-control" rows="3"></textarea>
            </div>
            <div class="col-12">
                <label class="form-label">Примечания</label>
                <textarea th:field="*{notes}" class="form-control" rows="2"></textarea>
            </div>
        </div>

        <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a th:href="@{/patients/{id}/records(id=${patient.id})}" class="btn btn-outline-secondary">Отмена</a>
        </div>
    </form>
</div>
</body>
</html>
