<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{fragments/layout}">
<head><title>Главная</title></head>
<body>
<div layout:fragment="content">

    <h2 class="mb-4">Добро пожаловать, <span sec:authentication="name"></span></h2>

    <div class="row g-3 mb-4">
        <div class="col-sm-6 col-md-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="fs-1 text-primary">&#128101;</div>
                    <div>
                        <div class="fs-2 fw-bold" th:text="${totalPatients}">0</div>
                        <div class="text-muted small">Активных пациентов</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-md-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="fs-1 text-success">&#128203;</div>
                    <div>
                        <div class="fs-2 fw-bold" th:text="${todayRecords}">0</div>
                        <div class="text-muted small">Записей сегодня</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white fw-semibold">Последние зарегистрированные пациенты</div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>УИН</th>
                        <th>ФИО</th>
                        <th>Дата рождения</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${recentPatients}">
                        <td th:text="${p.uin}" class="text-muted small"></td>
                        <td th:text="${p.fullName}"></td>
                        <td th:text="${#temporals.format(p.birthDate, 'dd.MM.yyyy')}"></td>
                        <td>
                            <a th:href="@{/patients/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary">Открыть</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(recentPatients)}">
                        <td colspan="4" class="text-center text-muted py-3">Нет пациентов</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer bg-white border-0">
            <a th:href="@{/patients}" class="btn btn-sm btn-primary">Все пациенты</a>
        </div>
    </div>

</div>
</body>
</html>
