<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head><title>Статистические талоны</title></head>
<body>
<div layout:fragment="content">
    <h2>Статистические талоны</h2>

    <form method="get" class="row g-2 mt-2 mb-4 align-items-end">
        <div class="col-auto">
            <label class="form-label">С</label>
            <input type="date" name="from" th:value="${from}" class="form-control">
        </div>
        <div class="col-auto">
            <label class="form-label">По</label>
            <input type="date" name="to" th:value="${to}" class="form-control">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Показать</button>
        </div>
        <div class="col-auto">
            <button type="button" class="btn btn-outline-secondary" onclick="window.print()">Печать</button>
        </div>
    </form>

    <div class="table-responsive">
        <table class="table table-bordered table-sm">
            <thead class="table-light">
            <tr>
                <th>Дата</th><th>Пациент</th><th>УИН</th><th>Код МКБ</th><th>Диагноз</th><th>Регистратор</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${records}">
                <td th:text="${#temporals.format(r.visitDate, 'dd.MM.yyyy')}"></td>
                <td th:text="${r.patient.fullName}"></td>
                <td th:text="${r.patient.uin}"></td>
                <td th:text="${r.icdCode ?: '—'}"></td>
                <td th:text="${r.diagnosis ?: '—'}"></td>
                <td th:text="${r.doctor?.fullName ?: '—'}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(records)}">
                <td colspan="6" class="text-center text-muted">Нет записей за период</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
