<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{fragments/layout}">
<head><title>Главная</title></head>
<body>
<div layout:fragment="content">

    <h2 class="mb-4">Добро пожаловать, <span sec:authentication="name"></span></h2>

    <div class="row g-3 mb-4">
        <div class="col-sm-6 col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="fs-1 text-primary">&#128100;</div>
                    <div>
                        <div class="fs-2 fw-bold" th:text="${totalUsers}">0</div>
                        <div class="text-muted small">Всего пользователей</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="fs-1 text-success">&#128737;</div>
                    <div>
                        <div class="fs-2 fw-bold" th:text="${activeAdmins}">0</div>
                        <div class="text-muted small">Активных админов</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="fs-1 text-info">&#128203;</div>
                    <div>
                        <div class="fs-2 fw-bold" th:text="${activeRegistrars}">0</div>
                        <div class="text-muted small">Активных регистраторов</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="fs-1 text-warning">&#9203;</div>
                    <div>
                        <div class="fs-2 fw-bold" th:text="${pendingUsers}">0</div>
                        <div class="text-muted small">Ожидают активации</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white fw-semibold">Последние события журнала аудита</div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Время</th>
                        <th>Пользователь</th>
                        <th>Действие</th>
                        <th>Объект</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="log : ${recentLogs}">
                        <td class="text-muted small" th:text="${#temporals.format(log.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
                        <td th:text="${log.changedBy}"></td>
                        <td><span class="badge bg-secondary" th:text="${log.action}"></span></td>
                        <td th:text="${log.entityType + ' #' + log.entityId}" class="small"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(recentLogs)}">
                        <td colspan="4" class="text-center text-muted py-3">Журнал пуст</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer bg-white border-0">
            <a th:href="@{/admin/audit}" class="btn btn-sm btn-primary">Весь журнал</a>
            <a th:href="@{/admin/users}" class="btn btn-sm btn-outline-secondary ms-2">Управление пользователями</a>
        </div>
    </div>

</div>
</body>
</html>
