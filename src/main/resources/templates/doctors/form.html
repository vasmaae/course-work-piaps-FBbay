<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head><title th:text="${doctor.id == null ? 'Новый врач' : 'Редактирование врача'}">Врач</title></head>
<body>
<div layout:fragment="content">
    <h2 th:text="${doctor.id == null ? 'Добавить врача' : 'Редактировать врача'}"></h2>
    <form th:action="${doctor.id == null ? '/doctors' : '/doctors/' + doctor.id}"
          th:object="${doctor}" method="post" class="mt-3" style="max-width: 500px">
        <div class="mb-3">
            <label class="form-label">ФИО *</label>
            <input type="text" th:field="*{fullName}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Специализация</label>
            <input type="text" th:field="*{specialization}" class="form-control" placeholder="Терапевт, Хирург...">
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a th:href="@{/doctors}" class="btn btn-outline-secondary">Отмена</a>
        </div>
    </form>
</div>
</body>
</html>
