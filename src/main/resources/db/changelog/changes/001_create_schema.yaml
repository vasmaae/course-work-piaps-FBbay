databaseChangeLog:
  - changeSet:
      id: "001-create-app-users"
      author: dev
      changes:
        - createTable:
            tableName: app_users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: full_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(20)
                  defaultValue: REGISTRAR
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: "001-create-doctors"
      author: dev
      changes:
        - createTable:
            tableName: doctors
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: full_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: specialization
                  type: VARCHAR(255)

  - changeSet:
      id: "001-create-therapeutic-sections"
      author: dev
      changes:
        - createTable:
            tableName: therapeutic_sections
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: number
                  type: INTEGER
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: doctor_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_section_doctor
                    references: doctors(id)

  - changeSet:
      id: "001-create-patients"
      author: dev
      changes:
        - createTable:
            tableName: patients
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uin
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: last_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: middle_name
                  type: VARCHAR(100)
              - column:
                  name: gender
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: birth_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: VARCHAR(20)
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  name: address
                  type: TEXT
              - column:
                  name: passport_series
                  type: VARCHAR(10)
              - column:
                  name: passport_number
                  type: VARCHAR(20)
              - column:
                  name: passport_issued_by
                  type: TEXT
              - column:
                  name: passport_issue_date
                  type: DATE
              - column:
                  name: section_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_patient_section
                    references: therapeutic_sections(id)
              - column:
                  name: privilege_category
                  type: VARCHAR(30)
              - column:
                  name: insurance_type
                  type: VARCHAR(10)
              - column:
                  name: insurance_number
                  type: VARCHAR(50)
              - column:
                  name: allergies
                  type: TEXT
              - column:
                  name: special_notes
                  type: TEXT
              - column:
                  name: is_archived
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            tableName: patients
            indexName: idx_patients_uin
            columns:
              - column:
                  name: uin
        - createIndex:
            tableName: patients
            indexName: idx_patients_last_name
            columns:
              - column:
                  name: last_name
        - createIndex:
            tableName: patients
            indexName: idx_patients_archived
            columns:
              - column:
                  name: is_archived

  - changeSet:
      id: "001-create-medical-records"
      author: dev
      changes:
        - createTable:
            tableName: medical_records
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_record_patient
                    references: patients(id)
              - column:
                  name: doctor_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_record_doctor
                    references: doctors(id)
              - column:
                  name: created_by_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_record_created_by
                    references: app_users(id)
              - column:
                  name: visit_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: complaints
                  type: TEXT
              - column:
                  name: diagnosis
                  type: TEXT
              - column:
                  name: icd_code
                  type: VARCHAR(20)
              - column:
                  name: treatment
                  type: TEXT
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: is_archived
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            tableName: medical_records
            indexName: idx_records_patient
            columns:
              - column:
                  name: patient_id
        - createIndex:
            tableName: medical_records
            indexName: idx_records_visit_date
            columns:
              - column:
                  name: visit_date
        - createIndex:
            tableName: medical_records
            indexName: idx_records_doctor
            columns:
              - column:
                  name: doctor_id

  - changeSet:
      id: "001-create-statistical-vouchers"
      author: dev
      changes:
        - createTable:
            tableName: statistical_vouchers
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_voucher_patient
                    references: patients(id)
              - column:
                  name: doctor_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_voucher_doctor
                    references: doctors(id)
              - column:
                  name: visit_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: diagnosis
                  type: TEXT
              - column:
                  name: icd_code
                  type: VARCHAR(20)
              - column:
                  name: visit_type
                  type: VARCHAR(50)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

  - changeSet:
      id: "001-create-audit-logs"
      author: dev
      changes:
        - createTable:
            tableName: audit_logs
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: entity_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: entity_id
                  type: BIGINT
              - column:
                  name: action
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: changed_by
                  type: VARCHAR(100)
              - column:
                  name: old_value
                  type: TEXT
              - column:
                  name: new_value
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            tableName: audit_logs
            indexName: idx_audit_entity
            columns:
              - column:
                  name: entity_type
              - column:
                  name: entity_id
        - createIndex:
            tableName: audit_logs
            indexName: idx_audit_created
            columns:
              - column:
                  name: created_at
